<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peacock Tail</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, #58a6ff, #3fb950, #d29922, #f85149, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }
    .status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 4px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      gap: 16px;
      padding: 16px 24px;
      max-height: calc(100vh - 60px);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow: auto;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    #summary-card {
      grid-column: 1 / -1;
    }
    #summary-card .content {
      font-size: 14px;
    }
    #summary-card .content h1,
    #summary-card .content h2,
    #summary-card .content h3 {
      font-size: 16px;
      margin-top: 8px;
    }
    #summary-card .content p { margin-bottom: 8px; }
    #summary-card .content code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    #summary-card .content pre {
      background: var(--bg);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }
    #summary-card .content pre code {
      padding: 0;
    }
    #charts-card {
      min-height: 300px;
    }
    .chart-container {
      position: relative;
      height: 250px;
      margin-bottom: 16px;
    }
    #kv-card .kv-table {
      width: 100%;
      border-collapse: collapse;
    }
    #kv-card .kv-table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    #kv-card .kv-table td:first-child {
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
      width: 40%;
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      font-size: 14px;
      text-align: center;
      padding: 32px;
    }

    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Peacock Tail</h1>
    <span class="status" id="status">
      <span class="dot"></span>
      Connecting...
    </span>
  </header>

  <main>
    <div class="card" id="summary-card">
      <h2>Summary</h2>
      <div class="content" id="summary">
        <div class="empty-state">Waiting for first analysis...</div>
      </div>
    </div>

    <div class="card" id="charts-card">
      <h2>Trends</h2>
      <div id="charts">
        <div class="empty-state">No trend data yet</div>
      </div>
    </div>

    <div class="card" id="kv-card">
      <h2>Key Values</h2>
      <div id="key-values">
        <div class="empty-state">No data yet</div>
      </div>
    </div>
  </main>

  <script>
    const COLORS = ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#f778ba','#79c0ff','#56d364'];
    let charts = {};

    function connect() {
      const ws = new WebSocket(`ws://${location.host}`);

      ws.onopen = () => {
        document.getElementById('status').innerHTML = '<span class="dot"></span>Connected';
      };

      ws.onclose = () => {
        document.getElementById('status').innerHTML = '<span class="dot" style="background:var(--red)"></span>Disconnected — retrying...';
        setTimeout(connect, 2000);
      };

      ws.onmessage = (e) => {
        try {
          const state = JSON.parse(e.data);
          render(state);
        } catch {}
      };
    }

    function render(state) {
      // Summary
      if (state.summary) {
        document.getElementById('summary').innerHTML = marked.parse(state.summary);
      }

      // Trends / Charts
      if (state.trends && state.trends.length > 0) {
        renderCharts(state.trends);
      }

      // Key-Values
      if (state.keyValues && Object.keys(state.keyValues).length > 0) {
        renderKeyValues(state.keyValues);
      }

      // Status
      if (state.lastUpdated) {
        const t = new Date(state.lastUpdated).toLocaleTimeString();
        document.getElementById('status').innerHTML =
          `<span class="dot"></span>Iteration ${state.iteration} &middot; ${t}`;
      }
    }

    function renderCharts(trends) {
      const container = document.getElementById('charts');

      trends.forEach((trend, i) => {
        const id = `chart-${i}`;
        let canvas = document.getElementById(id);

        if (!canvas) {
          container.innerHTML = '';
          for (let j = 0; j < trends.length; j++) {
            const div = document.createElement('div');
            div.className = 'chart-container';
            const c = document.createElement('canvas');
            c.id = `chart-${j}`;
            div.appendChild(c);
            container.appendChild(div);
          }
          canvas = document.getElementById(id);
          // Destroy any stale charts
          Object.values(charts).forEach(c => c.destroy());
          charts = {};
        }

        const color = COLORS[i % COLORS.length];
        const labels = trend.timestamps || trend.values.map((_, idx) => idx + 1);

        if (charts[id]) {
          charts[id].data.labels = labels;
          charts[id].data.datasets[0].data = trend.values;
          charts[id].update('none');
        } else {
          charts[id] = new Chart(canvas, {
            type: 'line',
            data: {
              labels,
              datasets: [{
                label: trend.label,
                data: trend.values,
                borderColor: color,
                backgroundColor: color + '20',
                fill: true,
                tension: 0.3,
                pointRadius: 2,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { labels: { color: '#e6edf3' } }
              },
              scales: {
                x: { ticks: { color: '#8b949e', maxTicksLimit: 8 }, grid: { color: '#30363d' } },
                y: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
              }
            }
          });
        }
      });
    }

    function renderKeyValues(kv) {
      const container = document.getElementById('key-values');
      let html = '<table class="kv-table">';
      for (const [k, v] of Object.entries(kv)) {
        html += `<tr><td>${esc(k)}</td><td>${esc(String(v))}</td></tr>`;
      }
      html += '</table>';
      container.innerHTML = html;
    }

    function esc(s) {
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }

    // Initial state fetch
    fetch('/api/state')
      .then(r => r.json())
      .then(state => { if (state.lastUpdated) render(state); })
      .catch(() => {});

    connect();
  </script>
</body>
</html>
